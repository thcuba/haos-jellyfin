name: "Jellyfin Media Server"
version: "12.0.2"
slug: "haos-jellyfin"
description: "Jellyfin media server with hardware acceleration"
url: "https://github.com/thcuba/haos-jellyfin"
codeowners: ["@thcuba"]
requirements:
  - homeassistant: "2024.1.0"
arch:
  - amd64
  - aarch64
map:
  - media:rw
devices:
  - /dev/dri
image: ghcr.io/thcuba/haos-jellyfin/{arch}
ports:
  8096/tcp: 8096
webui: "http://[HOST]:[PORT:8096]"
options:
  host: "0.0.0.0"
  port: 8096
schema:
  host: str
  port: port
