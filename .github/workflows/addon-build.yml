name: Addon Build
on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    if: contains(github.repository, 'haos-jellyfin')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup EnvVars
        run: |
          VERSION=$(yq -r '.version' haos-jellyfin/config.yaml)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./haos-jellyfin
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: |
            ghcr.io/thcuba/haos-jellyfin:latest-${{ matrix.arch }}
            ghcr.io/thcuba/haos-jellyfin:${{ env.VERSION }}-${{ matrix.arch }}

      - name: Create Release
        if: github.event_name == 'push' && matrix.arch == 'amd64'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: |
            Automated release for Jellyfin HAOS Addon.
            Version: ${{ env.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
