name: Addon Linter
on:
  push:
    branches: [ main ]
jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Lint with official Home Assistant action
        uses: home-assistant/addon-linter@v1
        with:
          name: 'haos-jellyfin'
          version: '12.0.2'
