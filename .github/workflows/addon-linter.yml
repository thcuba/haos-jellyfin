name: Addon Linter
on:
  push:
    branches: [ master ]
    paths:
      - 'haos-jellyfin/**'
  pull_request:
    branches: [ master ]
    paths:
      - 'haos-jellyfin/**'

jobs:
  lint:
    if: contains(github.repository, 'haos-jellyfin')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Home Assistant Add-on Linter
        uses: frenck/action-addon-linter@v2
        with:
          path: "./haos-jellyfin"
