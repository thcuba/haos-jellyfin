name: Bump Version
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'  # Monthly on the 1st

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: contains(github.repository, 'haos-jellyfin')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Calculate next version
        run: |
          VERSION=$(yq -r '.version' haos-jellyfin/config.yaml)
          NEXT_VERSION=$(echo "$VERSION" | awk -F. '{$NF = $NF + 1;} OFS="." 1')
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV

      - name: Bump version in config files
        run: |
          sed -i "s/^version: .*/version: \"${{ env.NEXT_VERSION }}\"/" haos-jellyfin/config.yaml
          sed -i "s/^version: .*/version: \"${{ env.NEXT_VERSION }}\"/" haos-jellyfin/addon.yaml 2>/dev/null || true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: version-bump-${{ env.NEXT_VERSION }}
          title: "Bump version to ${{ env.NEXT_VERSION }}"
          body: |
            Automated version bump to ${{ env.NEXT_VERSION }}.
            Please review and merge if acceptable.
          base: master
