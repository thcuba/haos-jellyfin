name: Bump Version
on:
  workflow_dispatch:
  release:
    types: [published]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup EnvVars
        run: |
          VERSION=$(yq -r '.version' haos-jellyfin/config.yaml)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Wait for CI
        uses: jitterbit/await-check-suites@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.sha }}
          timeout: 60

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        run: |
          NEXT_VERSION=$(echo ${{ env.VERSION }} | awk -F. '{$NF = $NF + 1;} OFS=. {print $0}')
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV

      - name: Run version bump script
        run: ./bump_version ${{ env.NEXT_VERSION }}

      - name: Commit and push changes
        run: |
          BRANCH="v${{ env.NEXT_VERSION }}"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "Bump version to ${{ env.NEXT_VERSION }}"
          git push origin "$BRANCH"

      - name: Create Pull Request
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "v${{ env.NEXT_VERSION }}"
          target_branch: "master"
          pr_title: "Automated version bump to v${{ env.NEXT_VERSION }}"
          pr_body: |
            This PR contains an automated version bump to v${{ env.NEXT_VERSION }}.
            Please review the changes and merge if everything looks good.
          github_token: ${{ secrets.GITHUB_TOKEN }}
